<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: gray;
        }

        .box {
            height: 20vh;
            width: 20vw;
            background-color: white;
            position: relative;
            margin: auto;
            top: 30vh;
            animation: mymove 5s infinite;
        }

        @keyframes mymove {
            from {
                left: 0px;
            }

            to {
                left: 200px;
                width: 5vw;
                height: 5vh;
                border-radius: 50%;
            }
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
