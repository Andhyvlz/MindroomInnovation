<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
 * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .header {
            width: 100vw;
            height: 15vh;
            background-color: rgb(75, 139, 160);
        }
        .nav {
            width: 100vw;
            height: 10vh;
            background-color: rgb(45, 81, 93);
        }
        .col {
            width: 15vw;
            height: 60vh;
            float: left;
            margin-left: 1.3vw;
            background-color: antiquewhite;
        }
        .footer {
            clear: both;
            width: 100vw;
            height: 15vh;
            background-color: rgb(75, 139, 160);
        }
    </style>
</head>
<body>
    <div class="header"></div>
    <div class="nav"></div>
    <div class="col"></div>
    <div class="col"></div>
    <div class="col"></div>
    <div class="col"></div>
    <div class="col"></div>
    <div class="col"></div>
    <div class="footer"></div>
</body>
</html>
